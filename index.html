<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WanderSiam | Booking Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfcfc; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .form-card { 
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        .input-field {
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            transition: all 0.2s ease;
            outline: none;
        }
        .input-field:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 1px #0f172a;
        }
        .label-text {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            color: #475569;
            margin-bottom: 6px;
        }
        .traveler-card { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="py-6 px-4">
    <div class="max-w-md mx-auto">
        
        <div class="text-center mb-10">
            <img src="https://i.ibb.co/VWv8yjRH/logo.png" alt="WanderSiam" class="mx-auto h-16 mb-4 object-contain">
            <h1 class="text-xl font-800 tracking-tight text-slate-900 uppercase">Booking Form</h1>
            <div class="w-10 h-1 bg-slate-900 mx-auto mt-2"></div>
        </div>

        <form id="bookingForm" class="space-y-6">
            
            <div class="form-card p-6 space-y-5">
                <h2 class="text-xs font-800 uppercase tracking-widest text-slate-400 border-b pb-3 mb-4">Arrival & Departure</h2>
                
                <div>
                    <label class="label-text">Arrival Date in Thailand</label>
                    <input type="date" name="arrivalDate" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Departure Date from Thailand</label>
                    <input type="date" name="departureDate" required class="input-field">
                </div>
            </div>

            <div id="travelersContainer" class="space-y-6"></div>

            <div class="space-y-3 pt-4">
                <button type="button" id="addTravelerBtn" class="w-full py-4 bg-white border border-slate-900 rounded-xl text-xs font-800 text-slate-900 active:scale-95 transition-all">
                    + ADD TRAVELER
                </button>
                
                <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-xl text-xs font-800 hover:bg-slate-800 active:scale-95 transition-all shadow-md uppercase tracking-widest">
                    Confirm Booking
                </button>
            </div>
        </form>

        <div id="statusMessage" class="hidden mt-6 p-4 rounded-lg text-center text-xs font-bold uppercase tracking-wider"></div>
        
        <footer class="mt-12 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">
            © 2026 WanderSiam Travel Solutions
        </footer>
    </div>

    <template id="travelerTemplate">
        <div class="traveler-card form-card p-6 relative">
            <div class="flex justify-between items-center mb-6 border-b pb-3">
                <h3 class="text-xs font-800 text-slate-900 traveler-title uppercase">Traveler #1</h3>
                <button type="button" class="remove-btn text-slate-300 hover:text-red-500 hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="label-text">Gender</label>
                    <select name="gender" required class="input-field">
                        <option value="">--</option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Mstr">Mstr</option>
                        <option value="Ms">Ms</option>
                    </select>
                </div>

                <div>
                    <label class="label-text text-slate-900">FIRST NAME(S) ACCORDING TO PASSPORT</label>
                    <input type="text" name="firstName" required class="input-field">
                </div>

                <div>
                    <label class="label-text text-slate-900">LAST NAME ACCORDING TO PASSPORT</label>
                    <input type="text" name="lastName" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Date of birth</label>
                    <input type="date" name="dob" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Nationality</label>
                    <input type="text" name="nationality" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Passport number</label>
                    <input type="text" name="passportNumber" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Expiry date passport</label>
                    <input type="date" name="passportExpiry" required class="expiry-input input-field">
                    <div class="expiry-warning hidden text-[10px] text-red-500 font-bold mt-2 uppercase italic">Passport expires in < 6 months</div>
                </div>

                <div>
                    <label class="label-text">Length in CM</label>
                    <input type="number" name="lengthCm" placeholder="e.g. 175" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Food allergies (if any)</label>
                    <textarea name="allergies" rows="2" placeholder="e.g. vegetarian, allergic to peanuts" class="input-field"></textarea>
                </div>
            </div>
        </div>
    </template>

    <script>
        // แก้ไข Webhook URL ให้ตรงตามที่กำหนด
        const WEBHOOK_URL = 'https://n8n-lab.greenwing.online/webhook/Booking'; 

        const container = document.getElementById('travelersContainer');
        const template = document.getElementById('travelerTemplate');
        const addBtn = document.getElementById('addTravelerBtn');
        const form = document.getElementById('bookingForm');
        const statusMsg = document.getElementById('statusMessage');

        let travelerCount = 0;

        function addTraveler() {
            if (travelerCount >= 10) return;
            travelerCount++;
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.traveler-card');
            card.querySelector('.traveler-title').textContent = `Traveler #${travelerCount}`;
            
            const removeBtn = card.querySelector('.remove-btn');
            if (travelerCount > 1) {
                removeBtn.classList.remove('hidden');
                removeBtn.addEventListener('click', (e) => {
                    e.currentTarget.closest('.traveler-card').remove();
                    travelerCount--;
                    reindexTravelers();
                });
            }

            const expiryInput = card.querySelector('.expiry-input');
            const warning = card.querySelector('.expiry-warning');
            expiryInput.addEventListener('change', () => {
                const expiry = new Date(expiryInput.value);
                const limit = new Date();
                limit.setMonth(limit.getMonth() + 6);
                if (expiry < limit) {
                    expiryInput.style.borderColor = '#ef4444';
                    warning.classList.remove('hidden');
                } else {
                    expiryInput.style.borderColor = '#e2e8f0';
                    warning.classList.add('hidden');
                }
            });

            container.appendChild(clone);
        }

        function reindexTravelers() {
            const cards = container.querySelectorAll('.traveler-card');
            cards.forEach((card, index) => {
                card.querySelector('.traveler-title').textContent = `Traveler #${index + 1}`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "SENDING...";

            const tripData = {
                arrivalDate: form.querySelector('[name="arrivalDate"]').value,
                departureDate: form.querySelector('[name="departureDate"]').value
            };

            const travelers = [];
            container.querySelectorAll('.traveler-card').forEach(card => {
                const data = {};
                card.querySelectorAll('input, select, textarea').forEach(i => data[i.name] = i.value);
                travelers.push(data);
            });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'cors', // เพิ่มโหมด CORS เพื่อความปลอดภัยในการรับส่งข้อมูล
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        submittedAt: new Date().toISOString(),
                        trip: tripData,
                        travelers: travelers
                    })
                });

                if (res.ok) {
                    showStatus('SUCCESSFULLY SENT', 'bg-slate-900 text-white');
                    form.innerHTML = '<div class="text-center py-20"><h2 class="text-sm font-800 uppercase tracking-widest text-slate-900">Thank you!</h2><p class="text-slate-400 text-xs mt-2 uppercase">Details received by WanderSiam.</p></div>';
                } else { throw new Error(); }
            } catch (err) {
                // หากยังขึ้น Error ให้ตรวจสอบการตั้งค่า CORS ใน Webhook Node ของ n8n
                showStatus('CONNECTION ERROR. PLEASE CHECK CORS IN N8N.', 'bg-red-50 text-red-600 border border-red-100');
                submitBtn.disabled = false;
                submitBtn.textContent = "Confirm Booking";
            }
        });

        function showStatus(msg, classes) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-6 p-4 rounded-lg text-center text-xs font-bold ${classes}`;
            statusMsg.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        addTraveler();
        addBtn.addEventListener('click', addTraveler);
    </script>
</body>
</html>
