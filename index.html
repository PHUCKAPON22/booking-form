<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSiam | Agentic Booking Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .traveler-card { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); transition: all 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .input-focus { transition: all 0.2s ease; }
        .input-focus:focus { transform: translateY(-1px); box-shadow: 0 4px 12px -2px rgba(0,0,0,0.05); }
        .success-tick { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        /* Custom Scrollbar for better UX */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="py-12 px-4">
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-12">
            <img src="https://i.ibb.co/VWv8yjRH/logo.png" alt="WanderSiam Logo" class="mx-auto h-20 mb-6 object-contain hover:scale-105 transition-transform">
            <h1 class="text-4xl font-900 text-slate-900 tracking-tight mb-2">Traveler Information</h1>
            <p class="text-slate-500 font-medium uppercase tracking-widest text-sm">Direct Booking System</p>
            <div class="w-16 h-1.5 bg-emerald-500 mx-auto mt-4 rounded-full"></div>
        </div>

        <form id="bookingForm" class="space-y-10">
            <div id="travelersContainer" class="space-y-10">
                </div>

            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between border-t border-slate-200 pt-10">
                <button type="button" id="addTravelerBtn" class="group flex items-center px-8 py-4 bg-white border-2 border-slate-900 rounded-2xl text-sm font-bold text-slate-900 hover:bg-slate-900 hover:text-white transition-all shadow-sm active:scale-95">
                    <svg class="w-5 h-5 mr-2 group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                    ADD TRAVELER
                </button>
                
                <button type="submit" id="submitBtn" class="w-full sm:w-auto px-16 py-4 bg-emerald-600 text-white rounded-2xl text-sm font-black hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-200 active:scale-95 uppercase tracking-widest">
                    Confirm Booking
                </button>
            </div>
        </form>

        <div id="statusMessage" class="hidden mt-8 p-6 rounded-2xl text-center font-bold shadow-lg"></div>
        
        <footer class="mt-20 text-center">
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.3em] font-bold">WanderSiam Travel Solutions &bull; Secure Data Transmission</p>
        </footer>
    </div>

    <template id="travelerTemplate">
        <div class="traveler-card bg-white border border-slate-200 rounded-[2rem] p-8 shadow-sm relative group">
            <div class="absolute top-0 left-0 w-full h-2 bg-slate-100 group-hover:bg-emerald-500 transition-colors rounded-t-full"></div>
            
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <span class="flex items-center justify-center w-10 h-10 bg-slate-900 text-white rounded-xl font-black text-sm index-label">01</span>
                    <h3 class="text-xl font-900 text-slate-800 uppercase tracking-tight traveler-title">Main Traveler</h3>
                </div>
                <button type="button" class="remove-btn p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>

            <div class="bg-slate-50/50 rounded-2xl p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-6 gap-5">
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Title</label>
                        <select name="gender" required class="input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                            <option value="Mr.">Mr.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Mrs.">Mrs.</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">First Name</label>
                        <input type="text" name="firstName" placeholder="e.g. John" required class="input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-right">Last Name</label>
                        <input type="text" name="lastName" placeholder="e.g. Smith" required class="input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 px-2">
                <div class="relative group/input">
                    <label class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">
                        Passport Number
                        <span class="tick hidden text-emerald-500 success-tick">✓ Valid Format</span>
                    </label>
                    <input type="text" name="passportNumber" required placeholder="A1234567" 
                           class="passport-input input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500 uppercase">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Nationality</label>
                    <div class="relative">
                        <input type="text" name="nationality" required placeholder="United States" 
                               class="nationality-input input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                        <label class="same-as-first hidden absolute -top-9 right-0 items-center gap-1.5 cursor-pointer text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-100">
                            <input type="checkbox" class="copy-nationality"> Same as #1
                        </label>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-2">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Passport Expiry</label>
                    <input type="date" name="passportExpiry" required class="expiry-input input-focus w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                    <div class="expiry-warning hidden flex items-center mt-2 text-red-500 text-[10px] font-black uppercase tracking-tighter italic animate-pulse">
                        ⚠️ EXPIRES IN < 6 MONTHS (REMARKS ADDED)
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-right">Food Allergies / Needs</label>
                    <input type="text" name="allergies" placeholder="e.g. Peanuts, Halal, None" class="input-focus w-full bg-slate-50/50 border border-slate-100 rounded-xl p-3.5 text-sm outline-none focus:border-emerald-500">
                </div>
            </div>
        </div>
    </template>

    <script>
        const WEBHOOK_URL = 'https://n8n-lab.greenwing.online/webhook/Booking'; 
        const container = document.getElementById('travelersContainer');
        const template = document.getElementById('travelerTemplate');
        const addBtn = document.getElementById('addTravelerBtn');
        const form = document.getElementById('bookingForm');
        const statusMsg = document.getElementById('statusMessage');

        let travelerCount = 0;

        function addTraveler() {
            if (travelerCount >= 10) return;
            travelerCount++;
            
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.traveler-card');
            const titleEl = card.querySelector('.traveler-title');
            const indexEl = card.querySelector('.index-label');
            
            indexEl.textContent = travelerCount.toString().padStart(2, '0');
            titleEl.textContent = travelerCount === 1 ? 'Main Traveler' : `Traveler #${travelerCount}`;

            // Show Copy Nationality checkbox for travelers > 1
            if (travelerCount > 1) {
                card.querySelector('.same-as-first').classList.remove('hidden', 'flex');
                card.querySelector('.same-as-first').classList.add('flex');
                card.querySelector('.remove-btn').classList.remove('hidden');
                
                card.querySelector('.copy-nationality').addEventListener('change', (e) => {
                    if (e.target.checked) {
                        const firstNationality = container.querySelector('.nationality-input').value;
                        card.querySelector('.nationality-input').value = firstNationality;
                    }
                });
            }

            // Real-time Validation for Passport
            const passInput = card.querySelector('.passport-input');
            const tick = card.querySelector('.tick');
            passInput.addEventListener('input', () => {
                const val = passInput.value.trim();
                if (val.length >= 6 && /^[a-z0-9]+$/i.test(val)) {
                    tick.classList.remove('hidden');
                } else {
                    tick.classList.add('hidden');
                }
            });

            // Passport Expiry Logic (Soft Warning)
            const expiryInput = card.querySelector('.expiry-input');
            const warning = card.querySelector('.expiry-warning');
            expiryInput.addEventListener('change', () => {
                const expiry = new Date(expiryInput.value);
                const limit = new Date();
                limit.setMonth(limit.getMonth() + 6);
                
                if (expiry < limit) {
                    expiryInput.classList.add('border-red-500', 'bg-red-50');
                    warning.classList.remove('hidden');
                    card.dataset.expiryRisk = "true";
                } else {
                    expiryInput.classList.remove('border-red-500', 'bg-red-50');
                    warning.classList.add('hidden');
                    card.dataset.expiryRisk = "false";
                }
            });

            // Remove logic
            card.querySelector('.remove-btn').addEventListener('click', () => {
                card.remove();
                travelerCount--;
                reindexTravelers();
            });

            container.appendChild(clone);
            
            // Auto-scroll & Focus
            if (travelerCount > 1) {
                const newCard = container.lastElementChild;
                newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => newCard.querySelector('input').focus(), 600);
            }
        }

        function reindexTravelers() {
            container.querySelectorAll('.traveler-card').forEach((card, idx) => {
                const currentIdx = idx + 1;
                card.querySelector('.index-label').textContent = currentIdx.toString().padStart(2, '0');
                card.querySelector('.traveler-title').textContent = currentIdx === 1 ? 'Main Traveler' : `Traveler #${currentIdx}`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

            const travelers = [];
            container.querySelectorAll('.traveler-card').forEach((card, idx) => {
                const data = {};
                card.querySelectorAll('input, select').forEach(i => {
                    if (i.type !== 'checkbox') data[i.name] = i.value;
                });
                data.is_expired_risk = card.dataset.expiryRisk === "true";
                data.id = idx + 1;
                travelers.push(data);
            });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system: "WanderSiam_D2C",
                        submission_date: new Date().toISOString(),
                        total: travelers.length,
                        travelers: travelers
                    })
                });

                if (res.ok) {
                    statusMsg.innerHTML = "✨ SUCCESS! DATA SECURED.";
                    statusMsg.className = "mt-8 p-8 rounded-[2rem] bg-emerald-900 text-white text-center font-black animate-bounce shadow-2xl";
                    statusMsg.classList.remove('hidden');
                    form.classList.add('opacity-0', 'pointer-events-none');
                    setTimeout(() => {
                        form.innerHTML = `<div class="text-center py-10"><h2 class="text-3xl font-black mb-4">Thank you!</h2><p class="text-slate-500">Your details have been recorded for the team.</p></div>`;
                        form.classList.remove('opacity-0');
                    }, 500);
                } else { throw new Error(); }
            } catch (err) {
                statusMsg.textContent = "CONNECTION ERROR. PLEASE TRY AGAIN.";
                statusMsg.className = "mt-8 p-6 rounded-2xl bg-red-100 text-red-700 text-center font-bold";
                statusMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = "Confirm Booking";
            }
        });

        // Initialize first traveler
        addTraveler();
        addBtn.addEventListener('click', addTraveler);
    </script>
</body>
</html>
