<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WanderSiam | Tailormade Booking Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfcfc; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .form-card { 
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .input-field {
            width: 100%;
            background-color: #ffffff;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 16px; /* ป้องกัน iOS auto-zoom */
            transition: all 0.2s ease;
            outline: none;
        }
        .input-field:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05);
        }
        .label-text {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 6px;
        }
        .traveler-card { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="py-6 px-4 md:py-12">
    <div class="max-w-xl mx-auto"> <div class="text-center mb-8">
            <img src="https://i.ibb.co/VWv8yjRH/logo.png" alt="WanderSiam" class="mx-auto h-20 mb-3 object-contain">
            <h1 class="text-2xl font-800 tracking-tight text-slate-900 uppercase">Booking Form</h1>
            <p class="text-slate-400 text-sm mt-1">Tailormade Journey Planning</p>
        </div>

        <form id="bookingForm" class="space-y-6">
            
            <div class="form-card p-6 space-y-5">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-1.5 h-5 bg-slate-900 rounded-full"></div>
                    <h2 class="text-sm font-800 uppercase tracking-wider">Arrival & Departure</h2>
                </div>
                
                <div>
                    <label class="label-text">Arrival Date in Thailand</label>
                    <input type="date" name="arrivalDate" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Departure Date from Thailand</label>
                    <input type="date" name="departureDate" required class="input-field">
                </div>
            </div>

            <div id="travelersContainer" class="space-y-6"></div>

            <div class="space-y-3 pt-4">
                <button type="button" id="addTravelerBtn" class="w-full flex items-center justify-center px-6 py-4 bg-white border-2 border-slate-900 rounded-xl text-sm font-bold text-slate-900 active:scale-95 transition-all">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="12 4v16m8-8H4"></path></svg>
                    ADD TRAVELER
                </button>
                
                <button type="submit" class="w-full px-6 py-4 bg-slate-900 text-white rounded-xl text-sm font-bold hover:bg-slate-800 active:scale-95 transition-all shadow-lg uppercase tracking-widest">
                    Confirm Booking
                </button>
            </div>
        </form>

        <div id="statusMessage" class="hidden mt-6 p-4 rounded-xl text-center text-sm font-bold"></div>
        
        <footer class="mt-12 text-center text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em]">
            © 2026 WanderSiam Travel Solutions
        </footer>
    </div>

    <template id="travelerTemplate">
        <div class="traveler-card form-card p-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <h3 class="text-sm font-800 text-slate-900 traveler-title uppercase tracking-wider">Traveler #1</h3>
                </div>
                <button type="button" class="remove-btn text-slate-300 hover:text-red-500 transition-colors hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="label-text">Title</label>
                    <select name="title" required class="input-field">
                        <option value="">Select Title</option>
                        <option value="Mr">Mr</option>
                        <option value="Mrs">Mrs</option>
                        <option value="Mstr">Mstr</option>
                        <option value="Ms">Ms</option>
                    </select>
                </div>

                <div>
                    <label class="label-text">First Name(s) (as in passport)</label>
                    <input type="text" name="firstName" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Last Name (as in passport)</label>
                    <input type="text" name="lastName" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Date of Birth</label>
                    <input type="date" name="dob" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Nationality</label>
                    <input type="text" name="nationality" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Passport Number</label>
                    <input type="text" name="passportNumber" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Passport Expiry Date</label>
                    <input type="date" name="passportExpiry" required class="expiry-input input-field">
                    <div class="expiry-warning hidden text-[10px] text-red-500 font-bold mt-1 uppercase italic">Passport expires in less than 6 months!</div>
                </div>

                <div>
                    <label class="label-text">Length (CM)</label>
                    <input type="number" name="lengthCm" placeholder="e.g. 175" required class="input-field">
                </div>

                <div>
                    <label class="label-text">Food Allergies / Needs</label>
                    <textarea name="allergies" rows="2" placeholder="e.g. vegetarian, allergic to peanuts" class="input-field"></textarea>
                </div>
            </div>
        </div>
    </template>

    <script>
        const WEBHOOK_URL = 'https://n8n-lab.greenwing.online/webhook/booking'; 

        const container = document.getElementById('travelersContainer');
        const template = document.getElementById('travelerTemplate');
        const addBtn = document.getElementById('addTravelerBtn');
        const form = document.getElementById('bookingForm');
        const statusMsg = document.getElementById('statusMessage');

        let travelerCount = 0;

        function addTraveler() {
            if (travelerCount >= 10) return;
            travelerCount++;
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.traveler-card');
            card.querySelector('.traveler-title').textContent = `Traveler #${travelerCount}`;
            
            const removeBtn = card.querySelector('.remove-btn');
            if (travelerCount > 1) {
                removeBtn.classList.remove('hidden');
                removeBtn.addEventListener('click', (e) => {
                    e.currentTarget.closest('.traveler-card').remove();
                    travelerCount--;
                    reindexTravelers();
                });
            }

            const expiryInput = card.querySelector('.expiry-input');
            const warning = card.querySelector('.expiry-warning');
            expiryInput.addEventListener('change', () => {
                const expiry = new Date(expiryInput.value);
                const limit = new Date();
                limit.setMonth(limit.getMonth() + 6);
                if (expiry < limit) {
                    expiryInput.style.borderColor = '#ef4444';
                    warning.classList.remove('hidden');
                } else {
                    expiryInput.style.borderColor = '#e2e8f0';
                    warning.classList.add('hidden');
                }
            });

            container.appendChild(clone);
        }

        function reindexTravelers() {
            const cards = container.querySelectorAll('.traveler-card');
            cards.forEach((card, index) => {
                card.querySelector('.traveler-title').textContent = `Traveler #${index + 1}`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "PROCESSING...";

            const tripData = {
                arrivalDate: form.querySelector('[name="arrivalDate"]').value,
                departureDate: form.querySelector('[name="departureDate"]').value
            };

            const travelers = [];
            container.querySelectorAll('.traveler-card').forEach(card => {
                const data = {};
                card.querySelectorAll('input, select, textarea').forEach(i => data[i.name] = i.value);
                travelers.push(data);
            });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        submittedAt: new Date().toISOString(),
                        trip: tripData,
                        travelers: travelers
                    })
                });

                if (res.ok) {
                    showStatus('BOOKING SENT SUCCESSFULLY!', 'bg-slate-900 text-white');
                    form.innerHTML = '<div class="text-center py-20"><h2 class="text-xl font-800">THANK YOU!</h2><p class="text-slate-400 text-sm mt-2">Your details have been recorded.</p></div>';
                } else { throw new Error(); }
            } catch (err) {
                showStatus('ERROR. PLEASE TRY AGAIN.', 'bg-red-50 text-red-600 border border-red-100');
                submitBtn.disabled = false;
                submitBtn.textContent = "Confirm Booking";
            }
        });

        function showStatus(msg, classes) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-6 p-4 rounded-xl text-center text-sm font-bold ${classes}`;
            statusMsg.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        addTraveler();
        addBtn.addEventListener('click', addTraveler);
    </script>
</body>
</html>
