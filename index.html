<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSiam | Professional Booking Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .traveler-card { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .warning-border { border: 2px solid #ef4444 !important; background-color: #fef2f2; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <img src="https://i.ibb.co/VWv8yjRH/logo.png" alt="WanderSiam Logo" class="mx-auto h-24 mb-4 object-contain">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Tailormade Booking Form</h1>
            <div class="w-20 h-1 bg-slate-900 mx-auto mt-4"></div>
            <p class="text-slate-500 mt-4 text-lg">WanderSiam: Local Travel Experts.</p>
        </div>

        <form id="bookingForm" class="space-y-8">
            <div id="travelersContainer" class="space-y-8"></div>

            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between border-t border-slate-300 pt-10">
                <button type="button" id="addTravelerBtn" class="flex items-center px-8 py-4 bg-white border-2 border-slate-900 rounded-xl text-sm font-bold text-slate-900 hover:bg-slate-900 hover:text-white transition-all shadow-sm active:scale-95">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="12 4v16m8-8H4"></path></svg>
                    ADD ANOTHER TRAVELER
                </button>
                
                <button type="submit" class="w-full sm:w-auto px-12 py-4 bg-emerald-600 text-white rounded-xl text-sm font-bold hover:bg-emerald-700 transition-all shadow-lg active:scale-95 uppercase tracking-widest">
                    Confirm & Send Booking
                </button>
            </div>
        </form>

        <div id="statusMessage" class="hidden mt-8 p-6 rounded-xl text-center font-bold shadow-inner"></div>
        
        <footer class="mt-16 text-center text-slate-400 text-xs uppercase tracking-widest font-medium">
            © 2024 WanderSiam Travel Solutions.
        </footer>
    </div>

    <template id="travelerTemplate">
        <div class="traveler-card bg-white border border-slate-200 rounded-2xl p-8 shadow-md relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-slate-900"></div>
            
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <img src="https://i.ibb.co/VWv8yjRH/logo.png" class="w-8 h-8 object-contain opacity-80" alt="icon">
                    <h3 class="text-xl font-black text-slate-800 traveler-title uppercase tracking-tight">Traveler #1</h3>
                </div>
                <button type="button" class="remove-btn text-slate-300 hover:text-red-500 transition-colors hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-6 gap-6 mb-6">
                <div class="md:col-span-1">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Gender</label>
                    <select name="gender" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                        <option value="">--</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Mrs.">Mrs.</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">First Name</label>
                    <input type="text" name="firstName" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Last Name</label>
                    <input type="text" name="lastName" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Date of Birth</label>
                    <input type="date" name="dob" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nationality</label>
                    <input type="text" name="nationality" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Passport Number</label>
                    <input type="text" name="passportNumber" required class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Passport Expiry Date</label>
                    <input type="date" name="passportExpiry" required class="expiry-input w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                    <div class="expiry-warning hidden flex items-center mt-2 text-red-600 text-xs font-bold">
                        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        CRITICAL: EXPIRES IN LESS THAN 6 MONTHS
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Food Allergies</label>
                    <input type="text" name="allergies" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-slate-900 outline-none">
                </div>
            </div>
        </div>
    </template>

    <script>
        // แก้ไข: ใส่ URL Webhook จาก n8n ให้เต็มรูปแบบ (ตัวอย่าง: https://n8n.domain.com/webhook/uuid)
        const WEBHOOK_URL = 'https://n8n-lab.greenwing.online/webhook/your-id-here'; 

        const container = document.getElementById('travelersContainer');
        const template = document.getElementById('travelerTemplate');
        const addBtn = document.getElementById('addTravelerBtn');
        const form = document.getElementById('bookingForm');
        const statusMsg = document.getElementById('statusMessage');

        let travelerCount = 0;

        function addTraveler() {
            if (travelerCount >= 10) return;
            travelerCount++;
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.traveler-card');
            card.querySelector('.traveler-title').textContent = `Traveler #${travelerCount}`;
            
            const removeBtn = card.querySelector('.remove-btn');
            if (travelerCount > 1) {
                removeBtn.classList.remove('hidden');
                removeBtn.addEventListener('click', (e) => {
                    e.currentTarget.closest('.traveler-card').remove();
                    travelerCount--;
                    reindexTravelers();
                });
            }

            const expiryInput = card.querySelector('.expiry-input');
            const warning = card.querySelector('.expiry-warning');
            expiryInput.addEventListener('change', () => {
                const expiry = new Date(expiryInput.value);
                const limit = new Date();
                limit.setMonth(limit.getMonth() + 6);
                if (expiry < limit) {
                    expiryInput.classList.add('warning-border');
                    warning.classList.remove('hidden');
                } else {
                    expiryInput.classList.remove('warning-border');
                    warning.classList.add('hidden');
                }
            });

            container.appendChild(clone);
        }

        function reindexTravelers() {
            const cards = container.querySelectorAll('.traveler-card');
            cards.forEach((card, index) => {
                card.querySelector('.traveler-title').textContent = `Traveler #${index + 1}`;
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "SENDING...";

            const travelers = [];
            container.querySelectorAll('.traveler-card').forEach(card => {
                const data = {};
                card.querySelectorAll('input, select').forEach(i => data[i.name] = i.value);
                travelers.push(data);
            });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: new Date().toLocaleString(),
                        total: travelers.length,
                        data: travelers
                    })
                });

                if (res.ok) {
                    showStatus('SUCCESS! DATA SENT.', 'bg-emerald-100 text-emerald-800 border-2 border-emerald-200');
                    form.innerHTML = '<div class="text-center py-20"><h2 class="text-2xl font-bold">Thank you!</h2><p>Received by WanderSiam.</p></div>';
                } else { throw new Error(); }
            } catch (err) {
                showStatus('FAILED. CHECK URL.', 'bg-red-100 text-red-800 border-2 border-red-200');
                submitBtn.disabled = false;
                submitBtn.textContent = "Confirm & Send Booking";
            }
        });

        function showStatus(msg, classes) {
            statusMsg.textContent = msg;
            statusMsg.className = `mt-8 p-6 rounded-xl text-center font-bold ${classes}`;
            statusMsg.classList.remove('hidden');
        }

        addTraveler();
        addBtn.addEventListener('click', addTraveler);
    </script>
</body>
</html>
